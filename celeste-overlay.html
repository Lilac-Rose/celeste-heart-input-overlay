<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Celeste Input Overlay</title>
    <style>
        @font-face {
            font-family: 'Renogare';
            src: url('Renogare-Regular.otf') format('opentype');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: transparent;
            width: 2048px;
            height: 1632px;
            overflow: hidden;
        }

        /*
          Layout — 5 cols × 384px keys, 32px gap (stride = 416px)
          Rendered at 2048×1632 — scale down in OBS to whatever fits
          Col:    0     1     2     3     4
          Row 0:  .    JUMP   .   JUMP   .     ← bumps
          Row 1: GRAB   II   UP   DASH  DEMO   ← wide (flanking UP)
          Row 2:  .    LEFT  DOWN RIGHT  .     ← arrow cluster
          Row 3:  .     .   TALK   .    .     ← heart tip
        */

        .key {
            position: absolute;
            width: 384px;
            height: 384px;
            border-radius: 56px;
            background: #2a003a;
            border: 12px solid #5a1080;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Renogare', monospace;
            font-size: 80px;
            color: #9040c0;
            transition: background 0.04s, color 0.04s, border-color 0.04s;
            user-select: none;
            letter-spacing: 0.02em;
        }

        .key.arrow {
            font-family: 'JetBrainsMono Nerd Font Mono', 'Symbols Nerd Font', monospace;
            font-size: 144px;
        }

        .key.active {
            background: #7b00cc;
            border-color: #cc66ff;
            color: #ffffff;
        }

        /* Row 0 — bumps */
        #jump1 { left:  416px; top:    0; }
        #jump2 { left: 1248px; top:    0; }

        /* Row 1 — wide */
        #grab  { left:    0;   top:  416px; }
        #esc   { left:  416px; top:  416px; }
        #up    { left:  832px; top:  416px; }
        #dash  { left: 1248px; top:  416px; }
        #demo  { left: 1664px; top:  416px; }

        /* Row 2 — arrow cluster */
        #left  { left:  416px; top:  832px; }
        #down  { left:  832px; top:  832px; }
        #right { left: 1248px; top:  832px; }

        /* Row 3 — heart tip */
        #talk  { left:  832px; top: 1248px; }
    </style>
</head>
<body>
    <div id="jump1" class="key">JUMP</div>
    <div id="jump2" class="key">JUMP</div>

    <div id="grab"  class="key">GRAB</div>
    <div id="esc"   class="key">II</div>
    <div id="up"    class="key arrow">▲</div>
    <div id="dash"  class="key">DASH</div>
    <div id="demo"  class="key">DEMO</div>

    <div id="left"  class="key arrow">◀</div>
    <div id="down"  class="key arrow">▼</div>
    <div id="right" class="key arrow">▶</div>

    <div id="talk"  class="key">TALK</div>

    <script>
        // maps Windows scan codes to element IDs.
        // these come from the bridge — it converts evdev codes to scan codes
        // before sending, so this side stays consistent regardless of OS.
        // if you change your bindings, update the bridge's KEYMAP and mirror it here.
        const KEYMAP = {
            0x0001: 'esc',    // Escape      → pause (II)
            0x002E: 'jump1',  // C           → jump
            0xE048: 'up',     // Up arrow
            0xE04B: 'left',   // Left arrow
            0xE04D: 'right',  // Right arrow
            0xE050: 'down',   // Down arrow
            0x002D: 'dash',   // X           → dash
            0x002A: 'grab',   // Left Shift  → grab
            0x001E: 'jump2',  // A           → jump (alt bind)
            0x0020: 'demo',   // D           → demo
            0x001D: 'talk',   // Left Ctrl   → talk / interact
        };

        function setKey(code, pressed) {
            const el = document.getElementById(KEYMAP[code]);
            if (el) el.classList.toggle('active', pressed);
        }

        function connect() {
            const ws = new WebSocket('ws://localhost:16900/');

            ws.onmessage = e => {
                const d = JSON.parse(e.data);
                if (d.event_type === 'key_pressed')  setKey(d.keycode, true);
                if (d.event_type === 'key_released') setKey(d.keycode, false);
            };

            ws.onerror = () => {};
            // if the bridge restarts (e.g. after a crash), reconnect automatically
            ws.onclose = () => setTimeout(connect, 2000);
        }

        connect();
    </script>
</body>
</html>
